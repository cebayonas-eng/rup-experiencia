clases<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiencia Contractual RUP</title>

  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#1e3a8a">
</head>

<body>

<header>
  <h1>Experiencia Contractual</h1>
  <p>Consulta dinámica de contratos ejecutados</p>
</header>

<section class="filters">
   <select id="filtro-contratante">
     <option value="todos">Todos los contratantes</option>
   </select>

   <select id="filtro-entidad">
     <option value="todos">Todas las entidades</option>
   </select>

   <select id="filtro-tipo">
     <option value="todos">Todos los tipos de negocio</option>
   </select>

  <div class="actividad-wrapper">
    <input type="text" id="filtroClaseTexto" placeholder="Buscar por clase (código o nombre)">
    <div id="sugerencias-clase" class="sugerencias-box"></div>
  </div>

  <div class="actividad-wrapper">
    <input type="text" id="filtroActividadTexto" placeholder="Buscar por actividad">
    <div id="sugerencias-actividad" class="sugerencias-box"></div>
  </div>

  <div class="actividad-wrapper">
    <input type="text" id="buscador" placeholder="Buscar por objeto o contratante">
    <div id="sugerencias-objeto" class="sugerencias-box"></div>
  </div>

  <button id="btn-limpiar">Limpiar filtros</button>
  <button id="btn-exportar-excel">Exportar Excel</button>
 
</section>

<section class="kpis">
  <div class="card principal">
    <span>Total SMMLV</span>
    <strong id="total-smmlv">0</strong>
  </div>

  <div style="text-align:center; padding:1rem;">
    <button id="btn-dashboard-toggle" class="btn-dashboard-toggle">
      Ver Dashboard Estratégico
    </button>
  </div>

  <div class="card">
    <span>Total cuantía</span>
    <strong id="total-cuantia">$0</strong>
  </div>

  <div class="card">
    <span>Total contratos</span>
    <strong id="total-contratos">0</strong>
  </div>

  <div class="card">
    <span>Total contratantes</span>
    <strong id="total-contratantes">0</strong>
  </div>
</section>

<section class="dashboard">
  <h2>Dashboard Estratégico</h2>
  <button id="btn-exportar-pdf-dashboard" class="btn-dashboard-toggle">
   Exportar
  </button>

  <div id="dashboard-narrativa"></div>
  <div class="dashboard-grid">
    <div class="chart-card">
      <canvas id="chart-segmento"></canvas>
    </div>
    <div class="chart-card">
      <canvas id="chart-entidad"></canvas>
    </div>
    <div class="chart-card">
      <canvas id="chart-tipo"></canvas>
    </div>
  </div>
   
  <div id="bloque-ranking-clases">

    <h3 class="titulo-ranking">
       Clases UNSPSC con mayor participación</h3>

    <div id="ranking-clases"></div>
  </div>

</section>

<section class="tabla">
  <table>
    <thead>
      <tr>
        <th>Contrato</th>
        <th>Contratante</th>
        <th>Entidad</th>
        <th>Tipo negocio</th>
        <th>Cuantía</th>
        <th>SMMLV</th>
      </tr>
    </thead>
    <tbody id="tabla-contratos"></tbody>
  </table>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="app.js?v=5"></script>

</body>
</html>
